services:
  quiz-app:
    build:
      context: ..
      dockerfile: quiz-app/Dockerfile
    container_name: quiz-app
    restart: unless-stopped
    ports:
      - "3001:3001"
    # DB/관리자 비밀값은 같은 디렉터리의 .env에서만 주입(레포에 커밋 안 됨). .env.example 참고.
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - PORT=3001
