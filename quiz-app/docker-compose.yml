services:
  quiz-app:
    build:
      context: ..
      dockerfile: quiz-app/Dockerfile
    container_name: quiz-app
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      # 관리자 페이지(/admin) 로그인 비밀번호 — 운영 시 반드시 변경
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-admin1234}
